[pytest]
# Pytest configuration for lemma-backend project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths - where pytest should look for tests
testpaths = app/modules app/core

# Markers for categorizing tests
markers =
    unit: Unit tests for service layer
    e2e: End-to-end API tests
    integration: Integration tests that require external services (DB, SuperTokens, etc.)
    slow: Tests that take a long time to run
    worker: Tests that require the real streaq worker
    workspace: Tests that require a docker workspace runtime image
    provider: Tests that require real third-party provider credentials or APIs
    local_cli: Tests that require local Codex/OpenCode/Claude CLI binaries
    identity: Tests for identity module
    pod: Tests for pod module

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Output options
addopts =
    # Show verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Show warnings
    -W default
    # NOTE: output capture is intentionally left ON (no -s). The e2e suites emit
    # very chatty structlog/httpx logs; capturing them keeps passing runs clean
    # and only surfaces logs for failing tests. Pass `-s` on the CLI to debug.
    # Enable strict markers (must be defined above)
    --strict-markers
    # Show duration of slowest tests
    --durations=10
    # Avoid module-name collisions across module-local conftest packages (e.g. tests/e2e)
    --import-mode=importlib
    # Coverage options (if pytest-cov is installed)
    # --cov=domains
    # --cov-report=html
    # --cov-report=term-missing

# Minimum Python version required
minversion = 3.12

# Test collection patterns
norecursedirs = 
    .git
    .venv
    venv
    env
    __pycache__
    *.egg-info
    .pytest_cache
    node_modules
    migrations
    archived
    deprecated
    exp

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Pytest asyncio configuration
[pytest_asyncio]
# Automatically detect async tests
asyncio_mode = auto
