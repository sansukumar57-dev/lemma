<!doctype html>
<html>
  <body style="margin:0;background:#f7f6f1;color:#24211d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Helvetica,Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;color:#f7f6f1;">{preheader}</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f6f1;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#fffdf8;border:1px solid #dedbd2;border-radius:18px;overflow:hidden;box-shadow:0 18px 50px rgba(36,33,29,0.10);">
            <tr>
              <td style="padding:30px 32px 18px;">
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="vertical-align:bottom;padding-right:8px;">
                      <span style="display:inline-block;width:5px;height:14px;background:#24211d;border-radius:2px;margin-right:3px;"></span>
                      <span style="display:inline-block;width:5px;height:22px;background:#24211d;border-radius:2px;margin-right:3px;"></span>
                      <span style="display:inline-block;width:5px;height:30px;background:#24211d;border-radius:2px;"></span>
                    </td>
                    <td style="font-size:18px;line-height:1;font-weight:500;color:#24211d;">lemma</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 12px;">
                <div style="display:inline-block;padding:6px 10px;border:1px solid #dedbd2;border-radius:999px;background:#fbfaf6;color:#7a746a;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;">
                  <span style="color:#ff8200;">&#9679;</span>&nbsp; {invitation_label}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 8px;">
                <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:42px;line-height:1.05;font-weight:400;color:#24211d;">{heading}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 24px;">
                <p style="margin:0;color:#69645d;font-size:16px;line-height:1.65;">{subheading}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 28px;">
                <a href="{accept_url}" style="display:inline-block;background:#202124;color:#ffffff;text-decoration:none;border-radius:8px;padding:13px 18px;font-size:14px;font-weight:700;">{button_label}&nbsp; &rarr;</a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 32px;">
                {details_html}
              </td>
            </tr>
            <tr>
              <td style="border-top:1px solid #e8e4dc;padding:18px 32px 28px;color:#8a847b;font-size:12px;line-height:1.6;">
                This invite was sent to <a href="mailto:{to_email}" style="color:#5f5a52;">{to_email}</a>. Sign in with this email to accept.<br><br>
                Button not working? Paste this link into your browser:<br>
                <a href="{accept_url}" style="color:#5f5a52;word-break:break-all;">{accept_url}</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
