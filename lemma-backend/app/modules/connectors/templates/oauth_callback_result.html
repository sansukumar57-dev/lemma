<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{title}</title>
  </head>
  <body style="margin:0;background:#f7f6f1;color:#24211d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="min-height:100vh;background:#f7f6f1;">
      <tr>
        <td align="center" style="padding:44px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background:#fffdf8;border:1px solid #dedbd2;border-radius:18px;overflow:hidden;box-shadow:0 18px 50px rgba(36,33,29,0.10);">
            <tr>
              <td style="padding:30px 32px 18px;">
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="vertical-align:bottom;padding-right:8px;">
                      <span style="display:inline-block;width:5px;height:14px;background:#24211d;border-radius:2px;margin-right:3px;"></span>
                      <span style="display:inline-block;width:5px;height:22px;background:#24211d;border-radius:2px;margin-right:3px;"></span>
                      <span style="display:inline-block;width:5px;height:30px;background:#24211d;border-radius:2px;"></span>
                    </td>
                    <td style="font-size:18px;line-height:1;font-weight:500;color:#24211d;">lemma</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 12px;">
                <div style="display:inline-block;padding:6px 10px;border:1px solid #dedbd2;border-radius:999px;background:#fbfaf6;color:#7a746a;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;">
                  <span style="color:#ff8200;">&#9679;</span>&nbsp; {eyebrow}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 10px;">
                <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:42px;line-height:1.05;font-weight:400;color:#24211d;">{title}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 24px;">
                <p style="margin:0;color:#69645d;font-size:16px;line-height:1.65;">{message}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 32px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border:1px solid #dedbd2;border-radius:14px;background:#fbfaf6;">
                  <tr>
                    <td style="padding:16px 18px;font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:12px;line-height:1.8;color:#5f5a52;">
                      <div style="color:#9a948a;letter-spacing:2px;font-size:10px;text-transform:uppercase;">Connection status</div>
                      <div style="padding-top:8px;">$ lemma connector connect</div>
                      <div>&rarr; {detail_label}: {detail_value}</div>
                      <div style="color:#ff8200;">{status}</div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="border-top:1px solid #e8e4dc;padding:18px 32px 28px;color:#8a847b;font-size:12px;line-height:1.6;">
                This tab can be closed after you return to Lemma.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
