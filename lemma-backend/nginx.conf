events {
    worker_connections 1024;
}

http {
    # Buffer settings for large headers (JWT tokens)
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    large_client_header_buffers 4 32k;

    # Keep WebSocket upgrades working without sending "Connection: upgrade"
    # on normal HTTP/SSE requests.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' '';
    }

    # ============================================================
    # 1. HTTP -> HTTPS Redirect Server (for all domains)
    # ============================================================
    server {
        listen 80;
        server_name localhost api.localhost *.apps.localhost;
        return 301 https://$host$request_uri;
    }

    # ============================================================
    # 2. API Backend: api.localhost -> localhost:8000
    # ============================================================
    server {
        listen 443 ssl;
        server_name api.localhost;
        client_max_body_size 50M;

        ssl_certificate /etc/nginx/certs/api.localhost.pem;
        ssl_certificate_key /etc/nginx/certs/api.localhost-key.pem;

        location / {
            proxy_pass http://host.docker.internal:8000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection '';

            proxy_connect_timeout 5s;
            proxy_send_timeout 1h;
            proxy_read_timeout 1h;

            # SSE/streaming responses must flush each event as it arrives.
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            add_header X-Accel-Buffering no always;
            gzip off;
        }
    }

    # ============================================================
    # 4. Main Frontend: localhost -> lemma-frontend:8080
    # ============================================================
    server {
        listen 443 ssl;
        server_name localhost;
        client_max_body_size 50M;

        ssl_certificate /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

        location / {
            proxy_pass http://lemma-frontend:8080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support for Next.js dev mode (if needed)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 5s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }

    # ============================================================
    # 5. Desk Ingress: {slug}.apps.localhost -> API /public/desks
    # ============================================================
    server {
        listen 443 ssl;
        server_name "~^(?<desk_slug>[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)\.apps\.localhost$";
        client_max_body_size 50M;

        ssl_certificate /etc/nginx/certs/apps.localhost.pem;
        ssl_certificate_key /etc/nginx/certs/apps.localhost-key.pem;

        # Health check endpoint (nginx handles directly)
        location /health {
            access_log off;
            return 200 '{"status": "healthy"}';
            add_header Content-Type application/json;
        }

        # Root path - proxy to /public/desks
        location = / {
            proxy_pass http://host.docker.internal:8000/public/desks;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Desk-Public-Slug $desk_slug;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header Connection '';

            proxy_connect_timeout 5s;
            proxy_send_timeout 1h;
            proxy_read_timeout 1h;

            # SSE/streaming responses must flush each event as it arrives.
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            add_header X-Accel-Buffering no always;
            gzip off;
        }

        # All other paths - proxy to /public/desks with path preserved
        location / {
            proxy_pass http://host.docker.internal:8000/public/desks$request_uri;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Desk-Public-Slug $desk_slug;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header Connection '';

            proxy_connect_timeout 5s;
            proxy_send_timeout 1h;
            proxy_read_timeout 1h;

            # SSE/streaming responses must flush each event as it arrives.
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            add_header X-Accel-Buffering no always;
            gzip off;
        }
    }
}
