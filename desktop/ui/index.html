<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lemma</title>
<style>
  @font-face {
    font-family: "Fraunces";
    src: url("vendor/fonts/fraunces.woff2") format("woff2");
    font-weight: 300 600;
    font-display: swap;
  }
  @font-face {
    font-family: "Bricolage Grotesque";
    src: url("vendor/fonts/bricolage.woff2") format("woff2");
    font-weight: 300 700;
    font-display: swap;
  }
  @font-face {
    font-family: "DM Mono";
    src: url("vendor/fonts/dmmono-400.woff2") format("woff2");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "DM Mono";
    src: url("vendor/fonts/dmmono-500.woff2") format("woff2");
    font-weight: 500;
    font-display: swap;
  }
  :root {
    color-scheme: light;
    --ink: #1c1812;
    --ink-soft: rgba(28, 24, 18, 0.62);
    --ink-faint: rgba(28, 24, 18, 0.38);
    --gold: #c0801f;
    --gold-deep: #8a5c16;
    --bad: #b3382c;
    --mono: "DM Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --serif: "Fraunces", ui-serif, Georgia, serif;
    --sans: "Bricolage Grotesque", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at 50% 0%, rgba(216, 155, 61, 0.13), transparent 40%),
      linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.4)),
      #fffdf8;
    color: var(--ink);
    font: 15px/1.6 var(--sans);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overflow: hidden;
  }
  .scene {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 9vw;
    position: relative;
  }

  /* ---------- the presence ---------- */
  .orb-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 26px;
  }
  .orb-wrap::before {
    content: "";
    position: absolute;
    inset: 10%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(216, 155, 61, 0.18), transparent 66%);
    animation: halo 7s ease-in-out infinite;
  }
  @keyframes halo {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.06); }
  }
  .orb-wrap canvas { position: relative; width: 100% !important; height: 100% !important; }
  .scene.awake .orb-wrap { animation: bloom 1.6s ease forwards; }
  @keyframes bloom {
    0% { transform: scale(1); }
    55% { transform: scale(1.1); }
    100% { transform: scale(1.05); }
  }
  .scene.stalled .orb-wrap { filter: saturate(0.35); }
  .scene.stalled .orb-wrap::before { animation-play-state: paused; }

  /* ---------- the words ---------- */
  .statement {
    position: relative;
    min-height: 4.6em;
    width: 100%;
    max-width: 620px;
  }
  .statement p {
    position: absolute;
    inset: 0;
    margin: 0;
    font-family: var(--serif);
    font-size: 2.4rem;
    line-height: 1.26;
    font-weight: 420;
    letter-spacing: -0.01em;
    opacity: 1;
    transform: none;
    filter: none;
    transition:
      opacity 1.3s cubic-bezier(0.22, 1, 0.36, 1),
      transform 1.3s cubic-bezier(0.22, 1, 0.36, 1),
      filter 1.2s ease;
  }
  .statement p.out {
    opacity: 0;
    transform: translateY(-14px);
    filter: blur(6px);
    transition:
      opacity 0.42s ease,
      transform 0.42s ease,
      filter 0.38s ease;
  }
  .statement p.pre {
    transition: none !important;
    opacity: 0;
    transform: translateY(18px);
    filter: blur(7px);
  }
  .truth {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    margin: 0;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-indent: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    transition: opacity 1s ease;
  }
  .whisper {
    margin: 64px 0 0;
    max-width: 480px;
    font-size: 0.88rem;
    color: var(--ink-faint);
    line-height: 1.65;
    opacity: 0;
    transition: opacity 2.2s ease;
    min-height: 3.2em;
  }
  .whisper.on { opacity: 1; }
  .whisper .term { color: var(--gold-deep); font-weight: 600; }

  .choices {
    display: flex;
    gap: 16px;
    margin-top: 44px;
    justify-content: center;
  }
  .choice {
    all: unset;
    cursor: pointer;
    width: 250px;
    padding: 20px 22px;
    border: 1px solid rgba(28, 24, 18, 0.16);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.6);
    text-align: left;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
  }
  .choice:hover {
    border-color: var(--gold);
    background: #ffffff;
    transform: translateY(-2px);
  }
  .choice strong {
    display: block;
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .choice span {
    font-size: 0.84rem;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .choice .flag {
    display: block;
    font-family: var(--mono);
    font-size: 0.64rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 10px;
  }

  /* ---------- quiet chrome ---------- */
  .progress {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(28, 24, 18, 0.07);
  }
  .progress > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #d89b3d, var(--gold));
    border-radius: 0 99px 99px 0;
    box-shadow: 0 0 14px rgba(216, 155, 61, 0.6);
    transition: width 1.2s ease;
  }
  .corner {
    position: absolute;
    bottom: 18px;
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    opacity: 0.4;
    transition: opacity 0.3s ease;
  }
  .corner:hover { opacity: 1; }
  .corner.left { left: 22px; display: flex; gap: 18px; }
  .corner.right { right: 22px; }
  .corner button {
    all: unset;
    cursor: pointer;
    color: inherit;
  }
  .corner button:hover { color: var(--ink); }

  button.cta {
    font: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 13px 34px;
    border-radius: 999px;
    border: 1px solid #131313;
    background: #131313;
    color: #faf6ee;
    cursor: pointer;
    margin-top: 40px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 1.2s ease 0.5s, transform 1.2s ease 0.5s, background 0.2s ease;
  }
  .scene.awake button.cta { opacity: 1; transform: none; }
  button.cta:hover { background: #2a2a28; }

  .errbox {
    max-width: 560px;
    margin-top: 26px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--ink-soft);
    background: rgba(179, 56, 44, 0.07);
    border-radius: 10px;
    padding: 12px 16px;
    user-select: text;
  }
  .err-actions { display: flex; gap: 12px; justify-content: center; margin-top: 22px; }
  .err-actions button {
    font: inherit;
    font-size: 0.85rem;
    padding: 9px 22px;
    border-radius: 999px;
    border: 1px solid rgba(28, 24, 18, 0.25);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .err-actions button.dark { background: #131313; border-color: #131313; color: #faf6ee; }

  pre.log {
    position: absolute;
    left: 50%;
    bottom: 46px;
    transform: translateX(-50%);
    width: min(720px, 84vw);
    max-height: 180px;
    overflow: auto;
    background: rgba(16, 18, 20, 0.94);
    color: #d7dce2;
    font-family: var(--mono);
    font-size: 0.7rem;
    line-height: 1.5;
    border-radius: 12px;
    padding: 12px 15px;
    text-align: left;
    user-select: text;
  }
  [hidden] { display: none !important; }

  @media (prefers-reduced-motion: reduce) {
    .orb-wrap::before { animation: none; }
    .statement p, .whisper, button.cta {
      transition: opacity 0.2s ease;
      transform: none;
      filter: none;
    }
    .progress > div { transition: none; }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="orb-wrap" id="orb" aria-hidden="true"></div>

  <div class="statement" aria-live="polite">
    <p id="line"></p>
  </div>
  <p class="truth" id="truth"></p>

  <section id="choose" hidden>
    <div class="choices">
      <button class="choice" id="choose-local" type="button">
        <span class="flag">private · local-first</span>
        <strong>On this Mac</strong>
        <span>The whole platform runs here — agents, data, everything.
        Nothing leaves your machine. First setup takes a few minutes,
        once.</span>
      </button>
      <button class="choice" id="choose-cloud" type="button">
        <span class="flag">nothing to install</span>
        <strong>Lemma Cloud</strong>
        <span>Your workspace runs on lemma.work. Fastest way in — switch
        to local any time from the menu.</span>
      </button>
    </div>
  </section>

  <p class="whisper" id="whisper"></p>

  <button class="cta" id="open-app" type="button" hidden>Create your account</button>
  <div id="errwrap" hidden>
    <p class="errbox" id="errdetail"></p>
    <div class="err-actions">
      <button class="dark" id="retry" type="button">Try again</button>
      <button id="error-logs" type="button">View log</button>
    </div>
  </div>

  <div class="progress"><div id="bar"></div></div>
  <div class="corner left">
    <button id="toggle-log" type="button">log</button>
    <button id="switch-mode" type="button">use lemma cloud</button>
  </div>
  <div class="corner right" id="runinfo"></div>

  <pre class="log" id="log" hidden></pre>
</div>

<script>
  // ---- bridge: Tauri when available, scripted demo otherwise ------------
  (function () {
    const tauri = window.__TAURI__;
    if (tauri) {
      const invoke = (cmd, args) => tauri.core.invoke(cmd, args);
      window.lemmaDesktop = {
        start: () => invoke("start"),
        stop: (includeInfra = false) => invoke("stop", { includeInfra }),
        restart: () => invoke("restart"),
        openApp: () => invoke("open_app"),
        openAuth: () => invoke("login"),
        openLogs: () => invoke("open_logs"),
        chooseConnectionMode: () => invoke("choose_connection_mode"),
        setConnectionMode: (mode) => invoke("set_connection_mode", { mode }),
        getState: () => invoke("get_state"),
        onLog: (cb) => { tauri.event.listen("lemma:log", (e) => cb(e.payload)); },
        onState: (cb) => { tauri.event.listen("lemma:state", (e) => cb(e.payload)); },
      };
      return;
    }
    const listeners = { log: [], state: [] };
    const seq = ["download", "check", "infra", "workspace", "migrations", "backend", "frontend", "verify", "ready"];
    let i = 0, timer = null;
    const push = (s) => listeners.state.forEach((cb) => cb(s));
    const step = () => {
      const key = seq[i];
      push({
        status: key, phase: key, phaseKey: key,
        progress: Math.round(((i + 1) / seq.length) * 100),
        etaSeconds: (seq.length - i) * 7, setup: true,
        error: false, ready: key === "ready", running: true,
        mode: "local", url: "http://localhost:3711",
      });
      listeners.log.forEach((cb) => cb(`[demo] phase: ${key}`));
      if (i < seq.length - 1) { i += 1; timer = setTimeout(step, 7000); }
    };
    window.lemmaDesktop = {
      start: () => { clearTimeout(timer); i = 0; step(); },
      stop: () => clearTimeout(timer),
      restart: () => { clearTimeout(timer); i = 0; step(); },
      openApp: () => console.log("[demo] open app"),
      openAuth: () => console.log("[demo] open auth"),
      openLogs: () => console.log("[demo] open logs"),
      chooseConnectionMode: () => console.log("[demo] switch mode"),
      setConnectionMode: (mode) => { console.log("[demo] mode:", mode); if (mode === "local") window.lemmaDesktop.start(); },
      getState: () => Promise.resolve({ status: "waiting", phaseKey: "boot", progress: 2, ready: false, running: false, error: false, setup: true, mode: "undecided" }),
      onLog: (cb) => listeners.log.push(cb),
      onState: (cb) => listeners.state.push(cb),
    };
  })();

  // ---- the script: poetic line + honest mono subtitle per real phase ----
  const VOICE = {
    boot:       ["A new kind of workspace is arriving on this Mac.", "starting"],
    download:   ["Bringing the runtime here.", "downloading runtime"],
    check:      ["Preparing the ground.", "toolchain & configuration"],
    infra:      ["Giving it memory.", "database & cache"],
    workspace:  ["Building a safe room for agents to work in.", "agent sandbox"],
    migrations: ["Laying down structure.", "schemas & migrations"],
    backend:    ["Waking the services.", "core services"],
    frontend:   ["Drawing the interface.", "app"],
    verify:     ["Final checks.", "verifying"],
    ready:      ["It's ready.", "all systems up · your account and data stay on this mac"],
    stopping:   ["Winding down.", "stopping services"],
    stopped:    ["Asleep.", "services stopped"],
  };
  const READY_LINE = "It's ready. Create your account.";

  const scene = document.getElementById("scene");
  const lineEl = document.getElementById("line");
  const truth = document.getElementById("truth");
  const whisper = document.getElementById("whisper");
  const bar = document.getElementById("bar");
  const runinfo = document.getElementById("runinfo");
  const openBtn = document.getElementById("open-app");
  const errwrap = document.getElementById("errwrap");
  const errdetail = document.getElementById("errdetail");

  let shownLine = "";
  let queuedLine = null;
  let saying = false;
  function say(text) {
    if (saying) { queuedLine = text; return; }
    if (text === shownLine) return;
    saying = true;
    lineEl.classList.add("out");
    setTimeout(() => {
      lineEl.textContent = text;
      shownLine = text;
      lineEl.classList.remove("out");
      lineEl.classList.add("pre");
      void lineEl.offsetHeight;
      lineEl.classList.remove("pre");
      setTimeout(() => {
        saying = false;
        if (queuedLine !== null) {
          const next = queuedLine;
          queuedLine = null;
          say(next);
        }
      }, 900);
    }, 440);
  }

  let sawSetup = false;
  let lastPhase = "";
  function renderState(s) {
    if (!s || !s.phaseKey) return;
    if (s.mode === "undecided") return;
    if (s.running || s.ready) hideChooser();
    if (s.setup) sawSetup = true;
    lastPhase = s.phaseKey;

    if (s.error) {
      window.__orb?.stall();
      scene.classList.add("stalled");
      scene.classList.remove("awake");
      say("Something stopped.");
      truth.textContent = "";
      errdetail.textContent = s.status || "startup failed";
      errwrap.hidden = false;
      openBtn.hidden = true;
      whisper.classList.remove("on");
      return;
    }
    if (scene.classList.contains("stalled")) window.__orb?.resume();
    scene.classList.remove("stalled");
    errwrap.hidden = true;

    const voice = VOICE[s.phaseKey] || VOICE.boot;
    if (s.ready) {
      window.__orb?.awake();
      scene.classList.add("awake");
      say(READY_LINE);
      truth.textContent = VOICE.ready[1];
      openBtn.hidden = false;
      whisper.classList.remove("on");
      stopWhispers();
    } else {
      if (scene.classList.contains("awake")) {
        scene.classList.remove("awake");
        window.__orb?.resume();
        startWhispers();
      }
      openBtn.hidden = true;
      say(voice[0]);
      const eta = s.etaSeconds ? ` · ~${formatEta(s.etaSeconds)}` : "";
      truth.textContent = voice[1] + eta;
    }

    bar.style.width = `${Math.min(100, s.progress || 0)}%`;
    runinfo.textContent = s.ready
      ? ""
      : sawSetup
        ? "first run · only once"
        : "quick start";
  }
  function formatEta(seconds) {
    return seconds >= 90 ? `${Math.round(seconds / 60)}m` : `${seconds}s`;
  }

  // ---- whispers: one quiet concept at a time -----------------------------
  let whispers = [];
  let whisperIndex = 0;
  let whisperTimer = null;
  function nextWhisper() {
    if (!whispers.length) return;
    whisper.classList.remove("on");
    setTimeout(() => {
      const c = whispers[whisperIndex % whispers.length];
      whisperIndex += 1;
      whisper.innerHTML = "";
      const term = document.createElement("span");
      term.className = "term";
      term.textContent = c.term;
      whisper.appendChild(term);
      whisper.appendChild(document.createTextNode(" — " + lowerFirst(c.oneLiner)));
      whisper.classList.add("on");
    }, 1400);
  }
  function lowerFirst(text) { return text.charAt(0).toLowerCase() + text.slice(1); }
  function startWhispers() {
    clearInterval(whisperTimer);
    nextWhisper();
    whisperTimer = setInterval(nextWhisper, 14000);
  }
  function stopWhispers() { clearInterval(whisperTimer); }

  fetch("concepts.gen.json")
    .then((r) => r.json())
    .then((data) => {
      whispers = data.tour || [];
      setTimeout(startWhispers, 5000);
    })
    .catch(() => {});

  // ---- log ----------------------------------------------------------------
  const logEl = document.getElementById("log");
  const logLines = [];
  function appendLog(line) {
    if (!line) return;
    logLines.push(line);
    if (logLines.length > 500) logLines.shift();
    if (!logEl.hidden) { logEl.textContent = logLines.join("\n"); logEl.scrollTop = logEl.scrollHeight; }
  }
  function toggleLog() {
    logEl.hidden = !logEl.hidden;
    if (!logEl.hidden) { logEl.textContent = logLines.join("\n"); logEl.scrollTop = logEl.scrollHeight; }
  }
  document.getElementById("toggle-log").addEventListener("click", toggleLog);
  document.getElementById("error-logs").addEventListener("click", toggleLog);

  // ---- actions ------------------------------------------------------------
  openBtn.addEventListener("click", () => window.lemmaDesktop.openAuth());
  document.getElementById("retry").addEventListener("click", () => {
    errwrap.hidden = true;
    scene.classList.remove("stalled");
    say(VOICE.boot[0]);
    startWhispers();
    window.lemmaDesktop.start();
  });
  document.getElementById("switch-mode").addEventListener("click", () => window.lemmaDesktop.chooseConnectionMode());

  // ---- first-launch chooser ------------------------------------------------
  const chooseEl = document.getElementById("choose");
  function showChooser() {
    chooseEl.hidden = false;
    say("Welcome. Where should Lemma live?");
    truth.textContent = "nothing installs until you choose";
  }
  function hideChooser() {
    chooseEl.hidden = true;
  }
  document.getElementById("choose-local").addEventListener("click", () => {
    hideChooser();
    say(VOICE.boot[0]);
    truth.textContent = "";
    window.lemmaDesktop.setConnectionMode("local");
  });
  document.getElementById("choose-cloud").addEventListener("click", () => {
    hideChooser();
    say("Taking you to Lemma Cloud.");
    truth.textContent = "lemma.work";
    window.lemmaDesktop.setConnectionMode("hosted");
  });

  // ---- boot ----------------------------------------------------------------
  lineEl.textContent = VOICE.boot[0];
  truth.textContent = "";
  window.lemmaDesktop.onLog(appendLog);
  window.lemmaDesktop.onState(renderState);
  window.lemmaDesktop.getState().then((s) => {
    if (s && s.mode === "undecided") {
      showChooser();
    } else {
      renderState(s);
      if (s && s.mode === "local") window.lemmaDesktop.start();
    }
  });
</script>

<script type="module">
  // AnomalousOrb, ported from lemma-frontend/components/ui/anomalous-orb.tsx.
  // Same shaders, geometry, and gold (0xd89b3d); three.js vendored locally so
  // the splash never depends on the network.
  import * as THREE from "./vendor/three.module.min.js";

  const vertexShader = `
uniform float time;
varying vec3 vNormal;
varying vec3 vPosition;
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
float snoise(vec3 v) {
    const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
    p0 *= norm.x;
    p1 *= norm.y;
    p2 *= norm.z;
    p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
}
void main() {
    vNormal = normal;
    vPosition = position;
    float displacement = snoise(position * 2.1 + time * 0.5) * 0.18;
    vec3 newPosition = position + normal * displacement;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
}
`;
  const fragmentShader = `
uniform vec3 color;
uniform vec3 pointLightPos;
varying vec3 vNormal;
varying vec3 vPosition;
void main() {
    vec3 normal = normalize(vNormal);
    vec3 lightDir = normalize(pointLightPos - vPosition);
    float diffuse = max(dot(normal, lightDir), 0.0);
    float fresnel = pow(1.0 - max(dot(normal, vec3(0.0, 0.0, 1.0)), 0.0), 2.0);
    vec3 finalColor = color * (0.28 + diffuse * 0.58 + fresnel * 0.68);
    gl_FragColor = vec4(finalColor, 0.72);
}
`;

  const container = document.getElementById("orb");
  const prefersReducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
  camera.position.z = 3.4;

  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0xffffff, 0);
  container.appendChild(renderer.domElement);

  const geometry = new THREE.IcosahedronGeometry(1.15, 48);
  const material = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      pointLightPos: { value: new THREE.Vector3(0, 0, 4.5) },
      color: { value: new THREE.Color(0xd89b3d) },
    },
    vertexShader,
    fragmentShader,
    wireframe: true,
    transparent: true,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  let speed = 1;
  const targetColor = new THREE.Color(0xd89b3d);
  window.__orb = {
    awake() { speed = 2.4; targetColor.set(0xeab451); setTimeout(() => { speed = 1.3; }, 1800); },
    stall() { speed = 0.12; targetColor.set(0xb0a48d); },
    resume() { speed = 1; targetColor.set(0xd89b3d); },
  };

  const resize = () => {
    const { width, height } = container.getBoundingClientRect();
    camera.aspect = Math.max(1, width) / Math.max(1, height);
    camera.updateProjectionMatrix();
    renderer.setSize(Math.max(1, width), Math.max(1, height), false);
  };
  new ResizeObserver(resize).observe(container);
  resize();

  let clock = 0;
  let last = performance.now();
  const animate = (now) => {
    const dt = now - last;
    last = now;
    clock += dt * (prefersReducedMotion ? 0 : speed);
    material.uniforms.time.value = clock * 0.00035;
    material.uniforms.color.value.lerp(targetColor, 0.04);
    mesh.rotation.y += prefersReducedMotion ? 0 : 0.0016 * speed;
    mesh.rotation.x += prefersReducedMotion ? 0 : 0.0008 * speed;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  };
  requestAnimationFrame(animate);
</script>
</body>
</html>
